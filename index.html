<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruta Rock Radio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

p {
    color: #ccc;
}

.player {
    margin-top: 30px;
}

audio {
    width: 80%;
    max-width: 400px;
}

.footer {
    margin-top: 50px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎸 Ruta Rock Radio</h1>
    <p>Rock nacional e internacional 24/7</p>

    <div class="player">
        <audio controls autoplay>
            <source src="http://radios.solumedia.com:6752/stream" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <div class="footer">
        En vivo desde Argentina 🇦🇷
    </div>
</div>

</body>
</html>
